<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Свидетельство о государственной регистрации продукции WHIEDA VikVik">
    <title>Свидетельство о регистрации | WHIEDA VikVik</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Дополнительные стили для страницы */
        .certificate-page {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
        }
        
        .certificate-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        
        .certificate-image {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--gray-light);
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 40px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .back-link:hover {
            gap: 12px;
            color: var(--primary-dark);
        }
        
        @media (max-width: 768px) {
            .certificate-page {
                padding: 40px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="gradient-bg"></div>

    <!-- Шапка сайта -->
    <header>
        <div class="container">
            <div class="header-inner">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <div class="logo-text">
                        <h1>WHIEDA <span>VikVik</span></h1>
                        <p>официальный дистрибьютор</p>
                    </div>
                </div>
                <nav class="main-nav">
                    <a href="index.html#home">Главная</a>
                    <a href="index.html#catalog">Каталог</a>
                    <a href="index.html#contacts">Контакты</a>
                    <a href="index.html" id="profileBtnNav"><i class="fas fa-user"></i> Личный кабинет</a>
                </nav>
                <div class="header-actions">
                    <a href="index.html" class="cart-btn" id="cartBtnLink">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Мобильное меню -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-leaf"></i>
                </div>
                <div class="logo-text">
                    <h3>WHIEDA VikVik</h3>
                </div>
            </div>
            <button class="close-menu" id="closeMenuBtn">&times;</button>
        </div>
        <nav class="mobile-nav">
            <a href="index.html#home">Главная</a>
            <a href="index.html#catalog">Каталог</a>
            <a href="index.html#contacts">Контакты</a>
            <a href="index.html" id="profileBtnMobile"><i class="fas fa-user"></i> Личный кабинет</a>
        </nav>
    </div>

    <!-- Только изображение сертификата -->
    <div class="certificate-page">
        <div class="certificate-container">
            <img src="https://i.ibb.co/F41bCKVR/eastzs2.jpg" alt="Свидетельство о государственной регистрации" class="certificate-image">
            <div>
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Вернуться в магазин
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
